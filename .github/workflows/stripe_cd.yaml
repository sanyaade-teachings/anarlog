on:
  workflow_dispatch:

jobs:
  compute-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - run: git fetch --tags --force
      - uses: ./.github/actions/doxxer_install
      - id: version
        run: |
          VERSION=$(doxxer --config doxxer.stripe.toml next patch)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Computed version: $VERSION"

  deploy:
    needs: compute-version
    runs-on: depot-ubuntu-24.04-8
    timeout-minutes: 60
    concurrency: stripe-fly-deploy
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - uses: ./.github/actions/infisical_install
      - run: |
          set -euo pipefail

          posthog_api_key="$(
            infisical secrets get POSTHOG_API_KEY \
              --token="$INFISICAL_TOKEN" \
              --env=prod \
              --projectId="$INFISICAL_PROJECT_ID" \
              --path=/anarlog/ai \
              --output=json |
              python3 -c 'import json, sys; print(json.load(sys.stdin)[0]["secretValue"])'
          )"
          flyctl secrets set POSTHOG_API_KEY="$posthog_api_key" --stage --app hyprnote-stripe
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
      - run: flyctl deploy --config apps/stripe/fly.toml --dockerfile apps/stripe/Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  tag:
    needs: [compute-version, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: stripe_v${{ needs.compute-version.outputs.version }}
          tag_prefix: ""
