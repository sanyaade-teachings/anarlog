on:
  workflow_dispatch:
    inputs:
      legacy_ref:
        description: "Legacy tag or commit to build, for example desktop_v0.0.84"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        type: choice
        options:
          - stable
      publish:
        description: "Publish to CrabNebula after upload"
        required: true
        type: boolean
        default: true
      experimental_airgapped:
        description: "experimental_airgapped"
        required: false
        type: boolean
        default: false

run-name: Legacy Desktop CD (${{ inputs.channel }} / ${{ inputs.legacy_ref }})

concurrency:
  group: legacy-desktop-cd-${{ inputs.legacy_ref }}-${{ inputs.channel }}
  cancel-in-progress: true

env:
  CN_APPLICATION: "fastrepl/hyprnote"
  RELEASE_CHANNEL: ${{ inputs.channel }}
  TAURI_CONF_PATH: ./src-tauri/tauri.conf.${{ inputs.channel }}.json
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    permissions:
      contents: write
    runs-on: macos-14
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.legacy_ref }}
          lfs: true
          fetch-depth: 0
          fetch-tags: true

      - name: Validate ref against app version
        run: |
          VERSION=$(jq -r '.version' ./apps/desktop/src-tauri/tauri.conf.json)
          REF="${{ inputs.legacy_ref }}"
          echo "Building ref=$REF version=$VERSION channel=${{ inputs.channel }}"
          if [[ ! "$REF" == *"$VERSION"* ]]; then
            echo "::error::legacy_ref ($REF) does not include app version ($VERSION)"
            exit 1
          fi

      - if: ${{ inputs.publish }}
        uses: ./.github/actions/cn_release
        with:
          cmd: draft
          app: ${{ env.CN_APPLICATION }}
          key: ${{ secrets.CN_API_KEY }}
          channel: ${{ env.RELEASE_CHANNEL }}
          framework: tauri
          working-directory: ./apps/desktop

      - uses: ./.github/actions/setup_protoc
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/install_desktop_deps
        with:
          target: macos

      - uses: ./.github/actions/rust_install
        with:
          platform: macos

      - uses: ./.github/actions/pnpm_install

      - uses: ./.github/actions/poetry_install

      - run: poetry run python scripts/pre_build.py

      - run: pnpm -F desktop lingui:compile

      - run: pnpm -F ui build

      - uses: ./.github/actions/apple_cert
        id: apple-cert
        with:
          apple-certificate: ${{ secrets.APPLE_CERTIFICATE }}
          apple-certificate-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - if: ${{ inputs.experimental_airgapped }}
        run: |
          aws s3 cp s3://hyprnote-cache2/v0/resources/stt/nvidia_parakeet-v3_494MB.tar apps/desktop/src-tauri/resources/stt/nvidia_parakeet-v3_494MB.tar \
            --endpoint-url ${{ secrets.CLOUDFLARE_R2_ENDPOINT_URL }} \
            --region auto
          aws s3 cp s3://hyprnote-cache2/v0/resources/ttt/hypr-llm.gguf apps/desktop/src-tauri/resources/ttt/hypr-llm.gguf \
            --endpoint-url ${{ secrets.CLOUDFLARE_R2_ENDPOINT_URL }} \
            --region auto
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}

      - run: |
          aws s3 cp s3://argmax/stt apps/desktop/src-tauri/binaries/stt-aarch64-apple-darwin \
            --endpoint-url ${{ secrets.CLOUDFLARE_R2_ENDPOINT_URL }} \
            --region auto
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}

      - run: |
          chmod +x ./apps/desktop/src-tauri/binaries/stt-aarch64-apple-darwin
          ./scripts/sidecar.sh "./apps/desktop/${{ env.TAURI_CONF_PATH }}" "binaries/stt"

      - run: |
          pnpm -F desktop tauri build --target aarch64-apple-darwin --config ${{ env.TAURI_CONF_PATH }} --verbose
        env:
          CI: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AM_API_KEY: ${{ secrets.AM_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          KEYGEN_ACCOUNT_ID: ${{ secrets.KEYGEN_ACCOUNT_ID }}
          KEYGEN_VERIFY_KEY: ${{ secrets.KEYGEN_VERIFY_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ steps.apple-cert.outputs.cert-id }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - run: |
          mkdir -p target/release/
          find target/aarch64-apple-darwin/release -type f -not -path "*/\.*" -exec cp {} target/release/ \;
        working-directory: ./apps/desktop/src-tauri

      - uses: actions/upload-artifact@v4
        with:
          name: legacy-desktop-${{ inputs.channel }}-${{ github.run_id }}
          path: apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 7

      - if: ${{ inputs.publish }}
        uses: ./.github/actions/cn_release
        with:
          cmd: upload
          app: ${{ env.CN_APPLICATION }}
          key: ${{ secrets.CN_API_KEY }}
          channel: ${{ env.RELEASE_CHANNEL }}
          framework: tauri
          working-directory: ./apps/desktop

  publish:
    if: ${{ inputs.publish && needs.build.result == 'success' }}
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.legacy_ref }}
          lfs: true
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/cn_release
        with:
          cmd: publish
          app: ${{ env.CN_APPLICATION }}
          key: ${{ secrets.CN_API_KEY }}
          channel: ${{ env.RELEASE_CHANNEL }}
          framework: tauri
          working-directory: ./apps/desktop
