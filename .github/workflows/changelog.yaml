on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        type: choice
        options:
          - stable
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
      issue_number:
        required: false
        type: number
      comment_id:
        required: false
        type: number

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - run: git fetch --tags --force

      - if: inputs.comment_id
        uses: ./.github/actions/add-reaction
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
          comment: ${{ inputs.comment_id }}
          reaction: eyes

      - uses: ./.github/actions/doxxer_install
      - id: version
        run: |
          VERSION=$(doxxer --config doxxer.desktop.toml next patch)
          PREV=$(git tag -l 'desktop_v*' --sort=-v:refname | grep -E '^desktop_v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          CURRENT="HEAD"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "prev=$PREV" >> $GITHUB_OUTPUT

      - uses: anomalyco/opencode/github@latest
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        with:
          model: zai-coding-plan/glm-4.7
          prompt: |
            Read and follow positioning guidelines in `apps/web/content/AGENTS.md`.

            1.
            Create packages/changelog/content/${{ steps.version.outputs.version }}.md.
            Changelog should be generated from commits between ${{ steps.version.outputs.prev }} ~ ${{ steps.version.outputs.current }}.
            Follow guidelines in packages/changelog/content/AGENTS.md.

            2.
            Create a PR with title "Publish Changelog for ${{ steps.version.outputs.version }}"

            3. Do not run `typecheck`, `dprint` or `pnpm` things.
