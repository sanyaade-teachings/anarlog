# https://docs.netlify.com/build/configure-builds/overview/#definitions
# We must set package="apps/web" in the UI
[build]
command = "VITE_APP_VERSION=${VITE_APP_VERSION:-$COMMIT_REF} pnpm -F @hypr/web build"
publish = "apps/web/dist/client"
ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF apps/web packages/api-client packages/changelog packages/ui packages/utils package.json pnpm-lock.yaml"

[build.environment]
VITE_APP_URL = "https://anarlog.so"
NODE_OPTIONS = "--max-old-space-size=4096"
NODE_VERSION = "22"

[images]
# https://docs.netlify.com/build/image-cdn/overview/#remote-path
remote_images = [
  "https://char\\.com/.*",
  "https://hyprnote\\.com/.*",
  "https://ijoptyyjrfqwaqhyxkxj\\.supabase\\.co/.*",
]

# Anarlog documentation and agent discovery
[[redirects]]
from = "/skill"
to = "/skill.md"
status = 301
force = true

[[redirects]]
from = "/skill.md"
to = "https://docs.anarlog.so/skill.md"
status = 200
force = true
headers = { Origin = "docs.anarlog.so" }

[[redirects]]
from = "/skills"
to = "https://docs.anarlog.so/agents/skills"
status = 301
force = true

[[redirects]]
from = "/.well-known/skills/*"
to = "https://docs.anarlog.so/.well-known/skills/:splat"
status = 200
force = true
headers = { Origin = "docs.anarlog.so" }

[[redirects]]
from = "/.well-known/agent-skills/*"
to = "https://docs.anarlog.so/.well-known/agent-skills/:splat"
status = 200
force = true
headers = { Origin = "docs.anarlog.so" }

[[redirects]]
from = "/.well-known/vercel/*"
to = "https://docs.anarlog.so/.well-known/vercel/:splat"
status = 200
force = true
headers = { Origin = "docs.anarlog.so" }

[[redirects]]
from = "/docs"
to = "https://docs.anarlog.so"
status = 301
force = true

[[redirects]]
from = "/docs/*"
to = "https://docs.anarlog.so/:splat"
status = 301
force = true

